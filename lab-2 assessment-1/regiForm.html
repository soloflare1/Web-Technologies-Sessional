<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regi Form</title>
</head>
<body>

<form>

    <label>Name</label><br>
    <input type="text" name="name" placeholder="Your name">
    <br><br>

    <label>Email</label><br>
    <input type="email" name="email" placeholder="naba@gmail.com" required>
    <br><br>

    <label>Password</label><br>
    <input type="password" name="password" placeholder="Your password" required>
    <br><br>

    <label>Gender</label><br>
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="male"> Male

    <br><br>

    <label>Skills</label><br>
    <input type="checkbox" name="skills" value="cp"> Competitive Programming <br>
    <input type="checkbox" name="skills" value="react"> React <br>
    <input type="checkbox" name="skills" value="nextjs"> Next.js <br>
    <input type="checkbox" name="skills" value="sd"> Software Development <br>

    <br>

    <input type="submit">

</form>

</body>
</html>
